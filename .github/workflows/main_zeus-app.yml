name: CD (Deploy to Azure App Service)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 24.x
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_OPENAI_SERVER_PROXY: "true"
          NEXT_PUBLIC_OPENAI_STRICT_SERVER_ONLY: "false"

      - name: Verify Next.js standalone output
        run: |
          if [ ! -d .next/standalone ]; then
            echo "❌ .next/standalone not found — is output: 'standalone' set in next.config.ts?"
            exit 1
          fi
          if [ ! -f .next/standalone/server.js ]; then
            echo "❌ server.js missing from .next/standalone"
            exit 1
          fi
          echo "✅ Standalone output confirmed"

      - name: Prepare standalone package
        run: |
          mkdir -p azure-deploy/.next
          cp -R .next/standalone azure-deploy/.next/standalone
          cp -R .next/static    azure-deploy/.next/static
          if [ -d public ]; then cp -R public azure-deploy/public; fi
          node -e "
            const fs=require('fs');
            const p='azure-deploy/package.json';
            let j={name:'zeus-website-azure',private:true,scripts:{}};
            if(fs.existsSync(p)){ j=JSON.parse(fs.readFileSync(p,'utf8')); j.scripts=j.scripts||{}; }
            j.scripts.start='node .next/standalone/server.js';
            fs.writeFileSync(p, JSON.stringify(j,null,2));
          "

      - name: Verify build output
        run: |
          echo "--- azure-deploy structure ---"
          ls -la azure-deploy/
          ls -la azure-deploy/.next/
          ls -la azure-deploy/.next/standalone/
          echo "server.js exists: $(test -f azure-deploy/.next/standalone/server.js && echo YES || echo NO)"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-app
          path: azure-deploy
          include-hidden-files: true   # ✅ THE FIX — .next/ starts with dot, excluded by default

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
    steps:
      - name: Check Azure secrets
        id: azure_secrets
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          if [ -n "$AZURE_WEBAPP_NAME" ] && [ -n "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ Skipping deploy: missing AZURE_WEBAPP_NAME or AZURE_WEBAPP_PUBLISH_PROFILE"
          fi

      - name: Download deployment artifact
        if: steps.azure_secrets.outputs.ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: azure-app
          path: azure-deploy

      - name: Validate deployment package
        if: steps.azure_secrets.outputs.ready == 'true'
        run: |
          echo "Inspecting deployment package structure..."
          ls -la azure-deploy/
          ls -la azure-deploy/.next/standalone/ || echo "standalone dir missing!"
          if [ ! -f azure-deploy/package.json ]; then
            echo "❌ Missing azure-deploy/package.json"
            exit 1
          fi
          if [ ! -f azure-deploy/.next/standalone/server.js ]; then
            echo "❌ Missing azure-deploy/.next/standalone/server.js"
            exit 1
          fi
          echo "✅ Package validation passed"

      - name: Deploy to Azure Web App
        if: steps.azure_secrets.outputs.ready == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: azure-deploy
