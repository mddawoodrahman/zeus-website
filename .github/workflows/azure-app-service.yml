name: CD (Deploy to Azure App Service)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 20.x

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir -p azure-deploy/.next
          cp -R .next/standalone/* azure-deploy/
          cp -R .next/static azure-deploy/.next/static
          if [ -d public ]; then cp -R public azure-deploy/public; fi

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-app
          path: azure-deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: azure-app
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .