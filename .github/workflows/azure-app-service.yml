name: CD (Deploy to Azure App Service)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: 20.x

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir -p azure-deploy/.next
          cp -R .next/standalone/* azure-deploy/
          cp -R .next/static azure-deploy/.next/static
          if [ -d public ]; then cp -R public azure-deploy/public; fi
          node -e "const fs=require('fs'); const p='azure-deploy/package.json'; let j={name:'zeus-website-azure', private:true, scripts:{}}; if(fs.existsSync(p)){ j=JSON.parse(fs.readFileSync(p,'utf8')); j.scripts=j.scripts||{}; } j.scripts.start='node server.js'; fs.writeFileSync(p, JSON.stringify(j,null,2));"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-app
          path: azure-deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production

    steps:
      - name: Check Azure secrets
        id: azure_secrets
        run: |
          if [ -n "${{ secrets.AZURE_WEBAPP_NAME }}" ] && [ -n "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: missing AZURE_WEBAPP_NAME or AZURE_WEBAPP_PUBLISH_PROFILE."
          fi

      - name: Download deployment artifact
        if: steps.azure_secrets.outputs.ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: azure-app
          path: .

      - name: Deploy to Azure Web App
        if: steps.azure_secrets.outputs.ready == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .